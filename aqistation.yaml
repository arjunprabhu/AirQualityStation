substitutions:
  devicename: aqi-station
  friendly_name: Air Quality Station
  refresh_interval: "05"
  auto_scroll_start_delay: "30"
  auto_scroll_interval: "15"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    - priority: -10
      then:
        - wait_until:
            api.connected:
        - delay: 3s
        - script.execute: refresh_all_widgets
        - if:
            condition:
              binary_sensor.is_on: radar_presence
            then:
              - script.execute: auto_scroll_loop
        - delay: 120s
        - if:
            condition:
              not:
                binary_sensor.is_on: radar_presence
            then:
              - light.turn_off: display_backlight

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: "<to do : update as required>"
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "<to do : update as required>"


#udpate wifi ssid and password as required  

wifi:
  fast_connect: true
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} HS"
    password: !secret fallback_password

captive_portal:

# Time source for scheduled radar restart
time:
  - platform: sntp
    id: my_time
    timezone: "America/Chicago"
    servers:
      - "pool.ntp.org"
      - "time.google.com"
      - "time.cloudflare.com"
    on_time:
      - cron: "0 0 3 * * *"  # Every day at 3:00 AM
        then:
          - button.press: ld2412_restart_btn

# I2C for SPS30 and SGP4x
i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true
  frequency: 100kHz

# SPI for Display and Touch
spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9
  miso_pin: GPIO8        # Required for XPT2046 touch reads

# Touchscreen
touchscreen:
  platform: xpt2046
  id: my_touch
  cs_pin: GPIO1
  update_interval: 50ms
  transform:
    swap_xy: true
  calibration:
    x_min: 350
    x_max: 3850
    y_min: 300
    y_max: 3800

# Display -- LVGL mode (no lambda rendering)
display:
  - platform: ili9xxx
    model: ili9341
    id: my_display
    cs_pin: GPIO2
    dc_pin: GPIO3
    data_rate: 40MHz
    color_order: bgr
    invert_colors: false
    rotation: 90
    update_interval: never
    auto_clear_enabled: false

# MDI Icons (binary format for recoloring)
image:
  binary:
    # UI Icons
    - file: mdi:air-filter
      id: icon_air

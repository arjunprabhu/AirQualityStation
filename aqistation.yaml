# =============================================================================
# SENSORS
# =============================================================================
sensor:
  - platform: ld2412
    moving_distance:
      name : Moving Distance
    still_distance:
      id: radar_still_distance
      name: Still Distance
      on_value:
        then:
          - lvgl.label.update:
              id: local_dist_label
              text:
                format: "%.1f ft"
                args: ['x * 0.0328084']
                if_nan: "-- ft"
    moving_energy:
      name: Move Energy
    still_energy:
      name: Still Energy
    detection_distance:
      name: Detection Distance
    light:
      name: Light


  # --- Local: VEML7700 & SHT41 ---
  - platform: veml7700
    ambient_light:
      id: local_lux
      name: "Ambient Light"
      on_value:
        then:
          - lvgl.label.update:
              id: local_lux_label
              text:
                format: "%.0f lx"
                args: ['x']
                if_nan: "-- lx"
    update_interval: ${refresh_interval}s

  - platform: sht4x
    temperature:
      id: sht_temp
      name: "SHT41 Temperature"
      filters:
        - multiply: 0.738  # This applies a 
      on_value:
        then:
          - lvgl.label.update:
              id: local_temp_label
              text:
                format: "%.1f°F"
                args: ['x * 1.8 + 32.0']
                if_nan: "--°F"
    humidity:
      id: sht_humid
      name: "SHT41 Humidity"
      on_value:
        then:
          - lvgl.label.update:
              id: local_humid_label
              text:
                format: "%.0f%%"
                args: ['x']
                if_nan: "--%%"
    update_interval: ${refresh_interval}s

  # --- Local: SPS30 Particulate Matter ---
  - platform: sps30
    pm_1_0:
      name: "PM <1um Weight concentration"
      id: local_PM_1_0
      on_value:
        then:
          - lvgl.bar.update:
              id: pm1_bar
              value: !lambda |-
                return isnan(x) ? 0 : (int)std::min(50.0f, x);
          - lvgl.label.update:
              id: pm1_value_label
              text:
                format: "%.1f ug/m3"
                args: ['x']
                if_nan: "-- ug/m3"
    pm_2_5:
      name: "PM <2.5um Weight concentration"
      id: local_PM_2_5
      on_value:
        then:
          # Update Page 2 bar
          - lvgl.bar.update:
              id: pm25_bar
              value: !lambda |-
                return isnan(x) ? 0 : (int)std::min(50.0f, x);
          - lvgl.label.update:
              id: pm25_value_label
              text:
                format: "%.1f ug/m3"
                args: ['x']
                if_nan: "-- ug/m3"
          # Update Page 1 PM2.5 reference
          - lvgl.label.update:
              id: pm25_ref_label
              text:
                format: "PM2.5: %.1f ug/m3"
                args: ['x']
                if_nan: "PM2.5: --"
          # Calculate AQI from PM2.5
          - lambda: |-
              if (isnan(x)) {
                id(current_aqi) = -1;
                lv_label_set_text(id(aqi_value_label), "--");
                lv_label_set_text(id(aqi_quality_label), "");
                lv_label_set_text(id(status_aqi_value), "AQI: --");
                lv_obj_set_style_bg_color(id(aqi_badge_bg), lv_color_hex(0x404040), LV_PART_MAIN);
                return;
              }
              float c = x;
              int aqi;
              uint32_t color;
              const char* quality;
              if (c <= 12.0f) {
                aqi = (int)((50.0f/12.0f) * c);
                color = 0x00E000; quality = "Good";
              } else if (c <= 35.4f) {
                aqi = (int)(50.0f + (49.0f/23.4f) * (c - 12.1f));
                color = 0xF0E000; quality = "Moderate";
              } else if (c <= 55.4f) {
                aqi = (int)(101.0f + (49.0f/19.9f) * (c - 35.5f));
                color = 0xFF6600; quality = "Sensitive";
              } else if (c <= 150.4f) {
                aqi = (int)(151.0f + (49.0f/94.9f) * (c - 55.5f));
                color = 0xFF0000; quality = "Unhealthy";
              } else if (c <= 250.4f) {
                aqi = (int)(201.0f + (99.0f/99.9f) * (c - 150.5f));
                color = 0x8B00FF; quality = "Very Bad";
              } else {
                aqi = (int)(301.0f + (199.0f/249.9f) * (c - 250.5f));
                color = 0x800000; quality = "Hazardous";
              }
              if (aqi > 500) aqi = 500;
              id(current_aqi) = aqi;
              id(ha_exposed_aqi).publish_state(aqi);
              // Update AQI badge
              lv_label_set_text_fmt(id(aqi_value_label), "%d", aqi);
              lv_label_set_text(id(aqi_quality_label), quality);
              lv_obj_set_style_bg_color(id(aqi_badge_bg), lv_color_hex(color), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(aqi_quality_label), lv_color_hex(color), LV_PART_MAIN);
              // Update status bar AQI
              lv_label_set_text_fmt(id(status_aqi_value), "AQI: %d", aqi);
    pm_4_0:
      name: "PM <4um Weight concentration"
      id: local_PM_4_0
      on_value:
        then:
          - lvgl.bar.update:
              id: pm4_bar
              value: !lambda |-
                return isnan(x) ? 0 : (int)std::min(50.0f, x);
          - lvgl.label.update:
              id: pm4_value_label
              text:
                format: "%.1f ug/m3"
                args: ['x']
                if_nan: "-- ug/m3"
    pm_10_0:
      name: "PM <10um Weight concentration"
      id: local_PM_10_0
      on_value:
        then:
          - lvgl.bar.update:
              id: pm10_bar
              value: !lambda |-
                return isnan(x) ? 0 : (int)std::min(50.0f, x);
          - lvgl.label.update:
              id: pm10_value_label
              text:
                format: "%.1f ug/m3"
                args: ['x']
                if_nan: "-- ug/m3"
    pm_size:
      name: "Typical Particle size"
      id: pm_size
      on_value:
        then:
          - lvgl.label.update:
              id: particle_size_label
              text:
                format: "Avg. Particle Size: %.2f um"
                args: ['x']
                if_nan: "Avg. Particle Size: --"
    address: 0x69
    update_interval: ${refresh_interval}s

  # --- Local: SGP4x VOC & NOx ---
  - platform: sgp4x
    compensation:
      humidity_source: sht_humid
      temperature_source: sht_temp
    voc:
      name: "VOC Index"
      id: local_voc
      on_value:
        then:
          - lvgl.bar.update:
              id: voc_bar
              value: !lambda |-
                return isnan(x) ? 0 : (int)std::min(500.0f, x);
          - lvgl.label.update:
              id: voc_value_label
              text:
                format: "%.0f"
                args: ['x']
                if_nan: "--"
    nox:
      name: "NOx Index"
      id: local_nox
      on_value:
        then:
          - lvgl.bar.update:
              id: nox_bar
              value: !lambda |-
                return isnan(x) ? 0 : (int)std::min(500.0f, x);
          - lvgl.label.update:
              id: nox_value_label
              text:
                format: "%.0f"
                args: ['x']
                if_nan: "--"
    update_interval: ${refresh_interval}s

  # --- HA Imports ---
  - platform: homeassistant
    entity_id: sensor.outdoor_temp_and_humidity_sensor_temperature
    id: ha_outdoor_temp
    on_value:
      then:
        - lvgl.label.update:
            id: outdoor_temp_label
            text:
              format: "%.1f°F"
              args: ['x']
              if_nan: "--"

  - platform: homeassistant
    entity_id: sensor.living_room_thermostat_current_temperature
    id: ha_indoor_temp
    on_value:
      then:
        - lvgl.label.update:
            id: indoor_temp_label
            text:
              format: "%.1f\u00b0F"
              args: ['x']
              if_nan: "--"
        # Update status bar indoor temp (top-right, all pages)
        - lvgl.label.update:
            id: status_indoor_temp
            text:
              format: "%.0f\u00b0F"
              args: ['x']
              if_nan: "--"

  # --- WiFi Signal Strength ---
  - platform: wifi_signal
    name: "WiFi Signal"
    entity_category: "diagnostic"
    id: wifi_rssi
    update_interval: ${refresh_interval}s
    on_value:
      then:
        - lambda: |-
            lv_obj_t *icon = id(status_wifi_icon);
            uint32_t color;
            if (x > -50) {
              color = 0x00E000;  // Strong - green
            } else if (x > -70) {
              color = 0xF0E000;  // Good - yellow
            } else if (x > -80) {
              color = 0xFF6600;  // Weak - orange
            } else {
              color = 0xFF0000;  // Very weak - red
            }
            lv_obj_set_style_img_recolor(icon, lv_color_hex(color), LV_PART_MAIN);

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_rssi
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

  # --- Template Sensor for HA ---
  - platform: template
    name: "Calculated AQI"
    id: ha_exposed_aqi
    icon: mdi:air-filter
    unit_of_measurement: "AQI"
    accuracy_decimals: 0
    state_class: measurement


  - platform: uptime
    type: seconds
    name: ESP Uptime
    update_interval: ${refresh_interval}s




text_sensor:

  - platform: ld2412
    version:
      name: "LD2412 firmware version"
    mac_address:
      name: "LD2412 mac address"

  - platform: homeassistant
    entity_id: sensor.openweathermap_condition
    id: ha_weather_desc
    on_value:
      then:
        # Update weather text (capitalize first letter)
        - lvgl.label.update:
            id: weather_text_label
            text: !lambda |-
              if (x.empty()) return std::string("--");
              // Simple condition text cleanup
              std::string s = x;
              for (auto &c : s) { if (c == '-') c = ' '; }
              if (!s.empty()) s[0] = toupper(s[0]);
              return s;
        # Update weather icon based on condition
        - lambda: |-
            lv_obj_t *img = id(weather_icon);
            if (x == "sunny") {
              lv_img_set_src(img, id(icon_w_sunny));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xF0E000), LV_PART_MAIN);
            } else if (x == "clear-night") {
              lv_img_set_src(img, id(icon_w_night));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xB0B0B0), LV_PART_MAIN);
            } else if (x == "cloudy") {
              lv_img_set_src(img, id(icon_w_cloudy));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0x909090), LV_PART_MAIN);
            } else if (x == "partlycloudy") {
              lv_img_set_src(img, id(icon_w_partly_cloudy));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xF0E000), LV_PART_MAIN);
            } else if (x == "rainy") {
              lv_img_set_src(img, id(icon_w_rainy));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0x3498DB), LV_PART_MAIN);
            } else if (x == "pouring") {
              lv_img_set_src(img, id(icon_w_pouring));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0x3498DB), LV_PART_MAIN);
            } else if (x == "snowy") {
              lv_img_set_src(img, id(icon_w_snowy));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xFFFFFF), LV_PART_MAIN);
            } else if (x == "snowy-rainy") {
              lv_img_set_src(img, id(icon_w_snowy_rainy));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xB0B0FF), LV_PART_MAIN);
            } else if (x == "fog") {
              lv_img_set_src(img, id(icon_w_fog));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0x909090), LV_PART_MAIN);
            } else if (x == "windy" || x == "windy-variant") {
              lv_img_set_src(img, id(icon_w_windy));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xB0B0B0), LV_PART_MAIN);
            } else if (x == "lightning") {
              lv_img_set_src(img, id(icon_w_lightning));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xF0E000), LV_PART_MAIN);
            } else if (x == "lightning-rainy") {
              lv_img_set_src(img, id(icon_w_lightning_rainy));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xF0E000), LV_PART_MAIN);
            } else if (x == "hail") {
              lv_img_set_src(img, id(icon_w_hail));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xB0B0FF), LV_PART_MAIN);
            } else if (x == "exceptional") {
              lv_img_set_src(img, id(icon_w_exceptional));
              lv_obj_set_style_img_recolor(img, lv_color_hex(0xFF3000), LV_PART_MAIN);
            }

# =============================================================================
# SCRIPTS
# =============================================================================
script:
  - id: auto_scroll_loop
    mode: restart
    then:
      - delay: ${auto_scroll_start_delay}s
      - while:
          condition:
            binary_sensor.is_on: radar_presence
          then:
            - lvgl.page.next:
                animation: OUT_LEFT
                time: 300ms
            - delay: ${auto_scroll_interval}s
  - id: page_next_script
    then:
      - lvgl.page.next:
          animation: OUT_LEFT
          time: 300ms
  - id: page_prev_script
    then:
      - lvgl.page.previous:
          animation: OUT_RIGHT
          time: 300ms
  - id: refresh_all_widgets
    then:
      - lambda: |-
          // Refresh all LVGL widgets from current sensor states after boot
          float pm25 = id(local_PM_2_5).state;
          float pm1 = id(local_PM_1_0).state;
          float pm4 = id(local_PM_4_0).state;
          float pm10 = id(local_PM_10_0).state;
          float voc = id(local_voc).state;
          float nox = id(local_nox).state;
          float psize = id(pm_size).state;
          float indoor = id(ha_indoor_temp).state;
          float outdoor = id(ha_outdoor_temp).state;
          float local_t = id(sht_temp).state;
          float local_h = id(sht_humid).state;
          float lux = id(local_lux).state;
          float radar_still = id(radar_still_distance).state;
          float aqi = id(ha_exposed_aqi).state;

          // Force on_value callbacks by re-publishing current states
          if (!isnan(pm1)) id(local_PM_1_0).publish_state(pm1);
          if (!isnan(pm25)) id(local_PM_2_5).publish_state(pm25);
          if (!isnan(pm4)) id(local_PM_4_0).publish_state(pm4);
          if (!isnan(pm10)) id(local_PM_10_0).publish_state(pm10);
          if (!isnan(voc)) id(local_voc).publish_state(voc);
          if (!isnan(nox)) id(local_nox).publish_state(nox);
          if (!isnan(psize)) id(pm_size).publish_state(psize);
          if (!isnan(indoor)) id(ha_indoor_temp).publish_state(indoor);
          if (!isnan(outdoor)) id(ha_outdoor_temp).publish_state(outdoor);
          if (!isnan(local_t)) id(sht_temp).publish_state(local_t);
          if (!isnan(local_h)) id(sht_humid).publish_state(local_h);
          if (!isnan(lux)) id(local_lux).publish_state(lux);
          if (!isnan(radar_still)) id(radar_still_distance).publish_state(radar_still);
          if (!isnan(aqi)) id(ha_exposed_aqi).publish_state(aqi);

          // Refresh weather text
          std::string weather = id(ha_weather_desc).state;
          if (!weather.empty()) id(ha_weather_desc).publish_state(weather);



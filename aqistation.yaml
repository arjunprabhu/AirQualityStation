# Globals
globals:
  - id: current_aqi
    type: int
    initial_value: "0"
  - id: touch_start_x
    type: int
    initial_value: "0"
  - id: touch_start_y
    type: int
    initial_value: "0"

# UART for mmWave Radar
uart:
  - id: uart_ld2412
    tx_pin: GPIO43
    rx_pin: GPIO44
    baud_rate: 115200
    parity: NONE
    stop_bits: 1


# mmWave Radar
ld2412:
  uart_id: uart_ld2412

binary_sensor:
  - platform: ld2412
    has_target:
      name: "Human Presence"
      id: radar_presence
      filters:
        - delayed_off: 2min
      on_press:
        then:
          - light.turn_on: display_backlight
          - script.execute: auto_scroll_loop
      on_release:
        then:
          - light.turn_off: display_backlight
          - script.stop: auto_scroll_loop
    has_moving_target:
      name: Moving Target
    has_still_target:
      name: Still Target
    dynamic_background_correction_status:
      name: Dynamic Background Correction Status
      
output:
  - platform: gpio
    pin: GPIO4
    id: backlight_gpio

light:
  - platform: binary
    name: "Display Backlight"
    id: display_backlight
    output: backlight_gpio
    restore_mode: ALWAYS_ON

# =============================================================================
# LVGL Configuration
# =============================================================================
lvgl:
  color_depth: 16
  bg_color: 0x000000
  border_width: 0
  outline_width: 0
  shadow_width: 0
  text_font: MONTSERRAT_14
  align: center
  displays:
    - my_display
  touchscreens:
    - my_touch
  page_wrap: true

  # Invisible full-screen overlay for swipe detection
  # (ESPHome on_touch doesn't fire when LVGL owns the touchscreen;
  #  LVGL widget events DO fire, so we use on_press/on_release here)
  top_layer:
    widgets:
      # Swipe detection overlay (full-screen, transparent)
      - obj:
          width: 320
          height: 240
          align: CENTER
          bg_opa: TRANSP
          border_width: 0
          scrollable: false
          on_press:
            - lambda: |-
                lv_point_t p;
                lv_indev_get_point(lv_indev_get_act(), &p);
                id(touch_start_x) = p.x;
                id(touch_start_y) = p.y;
            - script.execute: auto_scroll_loop
          on_release:
            - lambda: |-
                lv_point_t p;
                lv_indev_get_point(lv_indev_get_act(), &p);
                int dx = p.x - id(touch_start_x);
                int dy = p.y - id(touch_start_y);
                int swipe = (abs(dx) >= abs(dy)) ? dx : -dy;
                if (swipe < -30) {
                  id(page_next_script).execute();
                } else if (swipe > 30) {
                  id(page_prev_script).execute();
                }
      # --- Status bar (top-right, visible on all pages) ---
      # AQI status
      - label:
          id: status_aqi_value
          text: "AQI: --"
          text_font: MONTSERRAT_12
          text_color: 0x808080
          bg_opa: TRANSP
          align: TOP_RIGHT
          x: -80
          y: 6
      # Indoor temperature
      - label:
          id: status_indoor_temp
          text: "--"
          text_font: MONTSERRAT_12
          text_color: 0x808080
          bg_opa: TRANSP
          align: TOP_RIGHT
          x: -30
          y: 6
      # WiFi signal icon
      - image:
          id: status_wifi_icon
          src: icon_wifi
          align: TOP_RIGHT
          x: -4
          y: 5
          image_recolor: 0x00E000
          image_recolor_opa: 100%

  style_definitions:
    - id: style_card
      bg_color: 0x1A1A1A
      bg_opa: COVER
      border_width: 1
      border_color: 0x333333
      radius: 8
      pad_all: 6
      scrollbar_mode: "off"

    - id: style_page
      width: 320
      height: 240
      bg_color: 0x000000
      bg_opa: COVER
      border_width: 0
      pad_all: 0
      scrollbar_mode: "off"

  # ---------- PAGES ----------
